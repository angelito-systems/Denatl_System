version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: dental-system-app
        container_name: dental_system_app
        restart: always
        environment:
            # Rutas internas para Laravel PDF (Spatie Browsershot)
            - BROWSERSHOT_NODE_BIN=/usr/bin/node
            - BROWSERSHOT_NPM_BIN=/usr/bin/npm
            - BROWSERSHOT_CHROME_PATH=/usr/bin/chromium
            - BROWSERSHOT_NODE_MODULES_PATH=/var/www/html/node_modules
        volumes:
            - ./:/var/www/html
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD", "php-fpm", "-t" ]
            interval: 30s
            timeout: 10s
            retries: 3

    nginx:
        image: nginx:alpine
        container_name: dental_system_nginx
        restart: always
        ports:
            - "80:80"
        volumes:
            - ./public:/var/www/html/public:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            app:
                condition: service_healthy
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD", "wget", "-q", "--spider", "http://localhost" ]
            interval: 30s
            timeout: 10s
            retries: 3

    mysql:
        image: mysql:8.0
        container_name: dental_system_mysql
        restart: always
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
            MYSQL_DATABASE: ${DB_DATABASE:-system_dental}
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD" ]
            interval: 10s
            timeout: 5s
            retries: 5


volumes:
    mysql_data:
    postgres_data:
    evolution_redis_data:
    evolution_instances:
    evolution_store:

networks:
    dental_network:
        driver: bridge
