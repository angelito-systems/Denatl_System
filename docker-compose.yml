version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: dental-system-app
        container_name: dental_system_app
        restart: always
        environment:
            - DB_HOST=mysql
            - DB_DATABASE=${DB_DATABASE:-system_dental}
            - DB_USERNAME=${DB_USERNAME:-root}
            - DB_PASSWORD=${DB_PASSWORD:-root}
            - REDIS_HOST=redis
            - CACHE_STORE=redis
            - SESSION_DRIVER=redis
            - QUEUE_CONNECTION=redis
            # Rutas internas para Laravel PDF (Spatie Browsershot)
            - BROWSERSHOT_NODE_BIN=/usr/bin/node
            - BROWSERSHOT_NPM_BIN=/usr/bin/npm
            - BROWSERSHOT_CHROME_PATH=/usr/bin/chromium
            - BROWSERSHOT_NODE_MODULES_PATH=/var/www/html/node_modules
        volumes:
            - ./.env:/var/www/html/.env
            - ./storage:/var/www/html/storage
            - public_data:/var/www/html/public
            - evolution_store:/var/www/html/storage/app/evolution
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD", "php-fpm", "-t" ]
            interval: 30s
            timeout: 10s
            retries: 3

    nginx:
        image: nginx:alpine
        container_name: dental_system_nginx
        restart: always
        ports:
            - "80:80"
        volumes:
            - public_data:/var/www/html/public:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            app:
                condition: service_healthy
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD", "wget", "-q", "--spider", "http://localhost" ]
            interval: 30s
            timeout: 10s
            retries: 3

    mysql:
        image: mysql:8.0
        container_name: dental_system_mysql
        restart: always
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
            MYSQL_DATABASE: ${DB_DATABASE:-system_dental}
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD" ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: dental_system_redis
        restart: always
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 30s
            timeout: 10s
            retries: 3

    evolution_db:
        image: postgres:15-alpine
        container_name: dental_system_evolution_db
        restart: always
        environment:
            POSTGRES_USER: evolution_user
            POSTGRES_PASSWORD: DentalSecurePass2026
            POSTGRES_DB: evolution_database
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U evolution_user -d evolution_database" ]
            interval: 10s
            timeout: 5s
            retries: 5

    evolution_redis:
        image: redis:7-alpine
        container_name: dental_system_evolution_redis
        restart: always
        command: redis-server --appendonly yes
        volumes:
            - evolution_redis_data:/data
        networks:
            - dental_network
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 30s
            timeout: 10s
            retries: 3

    evolution-api:
        image: atendai/evolution-api:v2.2.1
        container_name: dental_system_evolution
        restart: always
        ports:
            - "8080:8080"
        environment:
            - SERVER_NAME=evolution
            - SERVER_TYPE=http
            - SERVER_PORT=8080
            - SERVER_URL=http://localhost:8080
            - WEBSOCKET_ENABLED=true
            - AUTHENTICATION_API_KEY=429683C4C977415CAAFCCE10F7D57E11
            - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
            - DATABASE_ENABLED=true
            - DATABASE_PROVIDER=postgresql
            - DATABASE_CONNECTION_URI=postgresql://evolution_user:DentalSecurePass2026@evolution_db:5432/evolution_database?schema=public
            - DATABASE_SAVE_DATA_INSTANCE=true
            - DATABASE_SAVE_DATA_NEW_MESSAGE=true
            - DATABASE_SAVE_MESSAGE_UPDATE=true
            - DATABASE_SAVE_DATA_CONTACTS=true
            - DATABASE_SAVE_DATA_CHATS=true
            - CACHE_REDIS_ENABLED=true
            - CACHE_REDIS_URI=redis://evolution_redis:6379/0
            - CACHE_REDIS_PREFIX_KEY=evolution
            - CACHE_REDIS_SAVE_INSTANCES=false
            - CACHE_LOCAL_ENABLED=false
            - CONFIG_SESSION_PHONE_CLIENT=Angelito Systems Dental
            - CONFIG_SESSION_PHONE_NAME=Chrome
            - DEL_INSTANCE=false
            - QRCODE_LIMIT=30
            - LANGUAGE=es
            - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG
            - LOG_COLOR=true
        volumes:
            - evolution_instances:/evolution/instances
            - evolution_store:/evolution/store
        networks:
            - dental_network
        depends_on:
            evolution_db:
                condition: service_healthy
            evolution_redis:
                condition: service_healthy

volumes:
    mysql_data:
    postgres_data:
    redis_data:
    evolution_redis_data:
    evolution_instances:
    evolution_store:
    public_data:

networks:
    dental_network:
        driver: bridge
